<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartExpense Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a15;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            color: #f43f5e;
            margin-bottom: 10px;
        }
        .card {
            background: #1a1a2e;
            border: 1px solid #f43f5e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .login-form {
            max-width: 400px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0a0a15;
            border: 1px solid #f43f5e;
            color: white;
            border-radius: 5px;
        }
        button {
            background: #f43f5e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #d63384;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f43f5e;
        }
        th {
            background: #1a1a2e;
            color: #f43f5e;
            font-weight: 600;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-tabs button {
            background: #1a1a2e;
            color: #f43f5e;
            padding: 10px 15px;
        }
        .nav-tabs button.active {
            background: #f43f5e;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .status-success { color: #10b981; }
        .status-danger { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 SmartExpense Admin Panel</h1>
            <p>Manage users, expenses, and monitor system activity</p>
        </div>

        <!-- Login Form (shown when not logged in) -->
        <div id="loginContainer" style="display: none;">
            <div class="card login-form">
                <h2 style="margin-bottom: 20px; color: #f43f5e;">Admin Login</h2>
                <input type="text" id="adminUsername" placeholder="Username">
                <input type="password" id="adminPassword" placeholder="Password">
                <button onclick="adminLogin()" style="width: 100%;">Login</button>
            </div>
        </div>

        <!-- Dashboard (shown when logged in) -->
        <div id="dashboardContainer" style="display: none;">
            <div class="nav-tabs">
                <button class="active" onclick="switchTab('users')">👥 Users</button>
                <button onclick="switchTab('expenses')">💸 Expenses</button>
                <button onclick="switchTab('logs')">📊 Activity Logs</button>
                <button onclick="adminLogout()" style="margin-left: auto; background: #ef4444;">🚪 Logout</button>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="tab-content active">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">📊 All Users</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Telegram</th>
                                <th>Expenses</th>
                                <th>Total Spent</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- Expenses Tab -->
            <div id="expensesTab" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">💸 All Expenses</h2>
                    <button onclick="exportAllData()" style="margin-bottom: 15px;">⬇️ Export as CSV</button>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>User</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Surprise</th>
                            </tr>
                        </thead>
                        <tbody id="expensesTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- Logs Tab -->
            <div id="logsTab" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">📊 Activity Logs</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>User ID</th>
                                <th>Action</th>
                                <th>Details</th>
                                <th>IP Address</th>
                            </tr>
                        </thead>
                        <tbody id="logsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in on page load
        window.onload = () => {
            checkAdminStatus();
        };

        async function checkAdminStatus() {
            try {
                const res = await fetch('/api/admin/check');
                const data = await res.json();
                if (data.logged_in) {
                    showDashboard();
                } else {
                    showLogin();
                }
            } catch (e) {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            loadUsers();
            loadExpenses();
            loadLogs();
        }

        async function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    showDashboard();
                } else {
                    alert('Invalid credentials');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                
                const table = document.getElementById('usersTable');
                table.innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td>${u.telegram_id || '-'}</td>
                        <td>${u.expense_count}</td>
                        <td>₹${u.total_spent.toLocaleString('en-IN')}</td>
                        <td>
                            <span class="${u.is_blocked ? 'status-danger' : 'status-success'}">
                                ${u.is_blocked ? '🔒 Blocked' : '✅ Active'}
                            </span>
                        </td>
                        <td>
                            <button onclick="toggleBlock(${u.id})" style="margin-right: 5px;">
                                ${u.is_blocked ? 'Unblock' : 'Block'}
                            </button>
                            <button onclick="deleteUser(${u.id})" style="background: #ef4444;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function loadExpenses() {
            try {
                const res = await fetch('/api/admin/expenses');
                const expenses = await res.json();
                
                const table = document.getElementById('expensesTable');
                table.innerHTML = expenses.slice(0, 100).map(e => `
                    <tr>
                        <td>${e.date}</td>
                        <td>${e.user_name}</td>
                        <td>${e.category}</td>
                        <td>${e.description}</td>
                        <td>₹${e.amount.toLocaleString('en-IN')}</td>
                        <td>${e.is_surprise ? '⭐' : '-'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function loadLogs() {
            try {
                const res = await fetch('/api/admin/logs');
                const logs = await res.json();
                
                const table = document.getElementById('logsTable');
                table.innerHTML = logs.slice(0, 50).map(l => `
                    <tr>
                        <td>${new Date(l.timestamp).toLocaleString()}</td>
                        <td>${l.user_id || '-'}</td>
                        <td>${l.action}</td>
                        <td>${l.details || '-'}</td>
                        <td>${l.ip}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function toggleBlock(userId) {
            try {
                const res = await fetch(`/api/admin/block/${userId}`, { method: 'POST' });
                if (res.ok) {
                    loadUsers();
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure?')) return;
            try {
                const res = await fetch(`/api/admin/delete/${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    loadUsers();
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function exportAllData() {
            window.location.href = '/api/admin/export';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');

            if (tab === 'users') loadUsers();
            if (tab === 'expenses') loadExpenses();
            if (tab === 'logs') loadLogs();
        }

        async function adminLogout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
                showLogin();
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
